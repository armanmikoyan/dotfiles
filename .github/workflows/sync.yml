name: Create sync PR

on:
  push:
    branches:
      - 'sync/*'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE=$(date '+%b %d, %Y')
          gh pr create \
            --title "sync dotfiles" \
            --body "Automated dotfiles sync — $DATE. Review the changes below." \
            --reviewer "${{ github.repository_owner }}"
