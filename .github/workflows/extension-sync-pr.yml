name: Create extension sync PR

on:
  push:
    branches:
      - 'sync/extensions-*'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE=$(date '+%b %d, %Y')
          gh pr create \
            --title "sync cursor extensions" \
            --body "Automated extension sync — $DATE. Review changes to \`extensions.txt\`." \
            --reviewer "${{ github.repository_owner }}"
