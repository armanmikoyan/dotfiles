name: Create extension sync PR

on:
  push:
    branches:
      - 'sync/extensions-*'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --title "sync cursor extensions" \
            --body "$(cat <<'EOF'
          ## Extension sync — $(date '+%b %d, %Y')

          Automated sync from local machine.
          Review the changes to `extensions.txt` below.
          EOF
          )" \
            --reviewer "${{ github.repository_owner }}"
